services:
  riichi-vision-agent:
    build: .
    container_name: riichi-vision-agent
    ports:
      - "${APP_PORT:-5174}:5174"
    environment:
      - APP_PORT=5174
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY}
      - ROBOFLOW_MODEL=${ROBOFLOW_MODEL}
      - ROBOFLOW_BASE_URL=${ROBOFLOW_BASE_URL}
      - ROBOFLOW_CONFIDENCE=${ROBOFLOW_CONFIDENCE}
      - ROBOFLOW_OVERLAP=${ROBOFLOW_OVERLAP}
      - ROBOFLOW_DEDUP_IOU=${ROBOFLOW_DEDUP_IOU}
      - ROBOFLOW_CLASS_MAP=${ROBOFLOW_CLASS_MAP}
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: riichi-vision-agent-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - riichi-vision-agent
    restart: unless-stopped
